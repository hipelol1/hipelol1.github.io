<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <title>Creayun</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }
    .navbar {
      position: fixed;
      top: 0;
      right: 0;
      width: auto;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 0 0 0 10px;
      z-index: 10;
    }
    .navbar ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: row;
    }
    .navbar li {
      margin: 0 10px;
    }
    .navbar a, .corner-button, .discord-load-button {
      display: inline-block;
      padding: 10px 15px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      text-decoration: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px 0;
    }
    .content {
      padding-top: 80px;
      text-align: center;
    }
    .contentFrame {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      z-index: 9999;
      background: white;
    }
    .close-button {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 10000;
      display: none;
      background: rgba(255, 0, 0, 0.8);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <header>
    <nav class="navbar">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="https://discord.com/invite/CJMgkBZ284" target="_blank">Discord</a></li>
        <li><a data-href="/games">Games</a></li>
        <li><a data-href="/apps">Apps</a></li>
        <li><a data-href="/proxy">Prxy</a></li>
        <li><a data-href="/tools">Tools</a></li>
        <li><a data-href="/misc">Download Games / Files</a></li>
        <li><a href="https://github.com/hipelol1/hipelol1.github.io/">Github</a></li>
        <li><a data-href="/settings">Settings</a></li>
      </ul>
    </nav>
  </header>

  <div class="content">
    <h1>Creayun</h1> 
    <p>By Laith!</p>
    <p>⚠️ This is in its BETA Stage ⚠️</p>
    <p>Please Report Bugs/Issues/Suggestions to the Discord server: 
      <a href="https://discord.com/invite/CJMgkBZ284" class="game-button">Discord</a>
    </p>

    <button class="discord-load-button" onclick="openDiscordPage()">Open Discord Page</button>
  </div>

  <iframe src="about:blank" class="contentFrame" onload="this.contentWindow.focus()"></iframe>

  <button class="close-button" onclick="closeIframe()">❌ Close</button>

  <a class="corner-button" id="credits-button" onclick="alert('Credits go here!')">Credits</a>

  <script src="script.js"></script>

  <script>
    function openDiscordPage() {
      const iframe = document.querySelector('.contentFrame');
      const closeButton = document.querySelector('.close-button');
      iframe.src = 'https://hipelol1.github.io/discord.html';
      iframe.style.display = 'block';
      closeButton.style.display = 'block';
      document.body.style.overflow = 'hidden';
    }

    function closeIframe() {
      const iframe = document.querySelector('.contentFrame');
      const closeButton = document.querySelector('.close-button');
      iframe.style.display = 'none';
      iframe.src = 'about:blank';
      closeButton.style.display = 'none';
      document.body.style.overflow = 'auto';
    }
  </script>
</body>
</html>
