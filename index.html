<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <title>Creayun</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .logo {
      text-align: center;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .logo img {
      width: 100px;
      height: auto;
      transition: all 0.3s ease;
    }

    .logo img:hover {
      filter: drop-shadow(0 0 10px #00f);
      transform: scale(1.05);
    }

    .navbar {
      position: fixed;
      top: 80px;
      right: 0;
      width: auto;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 0 0 0 10px;
    }

    .navbar ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: row;
    }

    .navbar li {
      margin: 0 10px;
    }

    .navbar a, .corner-button {
      display: inline-block;
      padding: 10px 15px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      text-decoration: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .content {
      display: block;
      padding-top: 140px;
    }

    #discord-widget {
      width: 100vw;
      height: 100vh;
      display: none;
    }
  </style>
</head>
<body>

  <div class="logo">
    <img src="favicon.ico" alt="Creayun Logo">
  </div>

  <header>
    <nav class="navbar">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="https://discord.com/invite/CJMgkBZ284" target="_blank">Discord</a></li>
        <li><a data-href="/games">Games</a></li>
        <li><a data-href="/apps">Apps</a></li>
        <li><a data-href="/proxy">Prxy</a></li>
        <li><a data-href="/tools">Tools</a></li>
        <li><a data-href="/misc">Download Games / Files</a></li>
        <li><a href="https://github.com/hipelol1/hipelol1.github.io/">Github</a></li>
        <li><a data-href="/settings">Settings</a></li>
      </ul>
    </nav>
  </header>

  <div class="content">
    <h1>Creayun</h1> 
    <p>By Laith!</p>
    <p>⚠️ This is in its BETA Stage ⚠️</p>
    <p>Please Report Bugs/Issues/Suggestions to the Discord server: 
      <a href="https://discord.com/invite/CJMgkBZ284" class="game-button">Discord</a>
    </p>
    <p>
      <a href="javascript:void(0);" class="game-button" onclick="showDiscord()">Go to Discord Page</a>
    </p>
  </div>

  <div id="discord-widget">
    <widgetbot
      server="1210078870326345738"
      channel="1359683653109547149"
      width="100%"
      height="100%"
    ></widgetbot>
  </div>

  <a class="corner-button" id="credits-button" onclick="alert('Credits go here!')">Credits</a>

  <script src="https://cdn.jsdelivr.net/npm/@widgetbot/html-embed"></script>
  <script>
    function showDiscord() {
      document.querySelector('.content').style.display = 'none';
      document.getElementById('discord-widget').style.display = 'block';
    }
  </script>

</body>
</html>
