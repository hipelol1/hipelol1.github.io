<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <title>Creayun</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
      /* Proper background fix */
      background: url('/images/minecraft_background.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      z-index: 1000;
    }

    .navbar ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .navbar li {
      margin: 0 10px;
    }

    .navbar a {
      display: inline-block;
      padding: 10px 15px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      text-decoration: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .content {
      margin-top: 80px;
      text-align: center;
    }

    #discordFrame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      z-index: 900;
    }

    #closeButton {
      position: fixed;
      top: 70px;
      right: 15px;
      z-index: 1100;
      display: none;
      background: rgba(255, 0, 0, 0.8);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 18px;
    }

    /* Style for bottom buttons */
    .discord-load-button, .corner-button {
      display: inline-block;
      padding: 10px 15px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      text-decoration: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <header>
    <nav class="navbar">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="https://discord.com/invite/CJMgkBZ284" target="_blank">Discord</a></li>
        <li><a href="/games">Games</a></li>
        <li><a href="/apps">Apps</a></li>
        <li><a href="/proxy">Prxy</a></li>
        <li><a href="/tools">Tools</a></li>
        <li><a href="/misc">Download Games / Files</a></li>
        <li><a href="https://github.com/hipelol1/hipelol1.github.io/">Github</a></li>
        <li><a href="/settings">Settings</a></li>
      </ul>
    </nav>
  </header>

  <iframe id="discordFrame"></iframe>

  <button id="closeButton" onclick="closeDiscord()">❌ Close</button>

  <div class="content" id="mainContent">
    <h1>Creayun</h1> 
    <p>By Laith!</p>
    <p>⚠️ This is in its BETA Stage ⚠️</p>
    <p>Report bugs or suggestions here: 
      <a href="https://discord.com/invite/CJMgkBZ284" target="_blank">Discord</a>
    </p>

    <button class="discord-load-button" onclick="openDiscord()">Open Discord Page</button>
  </div>

  <a class="corner-button" id="credits-button" onclick="alert('Credits go here!')">Credits</a>

  <script>
    function openDiscord() {
      // Open Discord page in iframe
      document.getElementById('discordFrame').src = 'https://hipelol1.github.io/discord.html';
      document.getElementById('discordFrame').style.display = 'block';
      document.getElementById('closeButton').style.display = 'block';
      document.getElementById('mainContent').style.display = 'none';
      
      // Redirect to Discord invite link
      window.open('https://discord.com/invite/CJMgkBZ284', '_blank');
    }

    function closeDiscord() {
      document.getElementById('discordFrame').style.display = 'none';
      document.getElementById('discordFrame').src = 'about:blank';
      document.getElementById('closeButton').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
    }
  </script>
</body>
</html>
